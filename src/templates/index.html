<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Quality Intelligence</title>
    <meta name="description" content="Advanced AI-powered Air Quality Forecasting">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h1>AIR QUALITY INTELLIGENCE</h1>
        <div class="location" id="location">Detecting precise geolocation...</div>
        
        <div class="badge" id="category" style="color: #cbd5e1;">Awaiting ML Inference</div>

        <div id="loader" class="loader"></div>

        <div class="forecast" id="forecast-grid" style="display: none;">
            <div class="forecast-card">
                <h3>Live Index</h3>
                <div id="aqi_now">--</div>
            </div>
            <div class="forecast-card">
                <h3>8 Hour ML Forecast</h3>
                <div id="aqi_8h">--</div>
            </div>
            <div class="forecast-card">
                <h3>24 Hour ML Forecast</h3>
                <div id="aqi_24h">--</div>
            </div>
            <div class="forecast-card">
                <h3>7 Day ML Forecast</h3>
                <div id="aqi_7d">--</div>
            </div>
        </div>

        <div class="cards" id="pollutants-grid" style="display: none;">
            <div class="card">
                <b>PM2.5 μg/m³</b>
                <span id="pm25">--</span>
            </div>
            <div class="card">
                <b>PM10 μg/m³</b>
                <span id="pm10">--</span>
            </div>
            <div class="card">
                <b>NO2 μg/m³</b>
                <span id="no2">--</span>
            </div>
            <div class="card">
                <b>CO μg/m³</b>
                <span id="co">--</span>
            </div>
            <div class="card">
                <b>SO2 μg/m³</b>
                <span id="so2">--</span>
            </div>
        </div>

        <div id="advice" style="display: none;">Computing environmental recommendations...</div>

        <button onclick="fetchAQI()" id="refresh-btn">Fetch ML Forecast</button>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
