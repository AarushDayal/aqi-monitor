<!DOCTYPE html>
<html>
<head>
    <title>AQI Forecast Dashboard</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="container">

    <h1>AQI FORECAST</h1>

    <!-- Forecast Cards -->
    <div class="forecast">

        <div class="forecast-card">
            <h3>Now</h3>
            <div id="aqi_now">--</div>
        </div>

        <div class="forecast-card">
            <h3>8 Hours</h3>
            <div id="aqi_8h">--</div>
        </div>

        <div class="forecast-card">
            <h3>24 Hours</h3>
            <div id="aqi_24h">--</div>
        </div>

        <div class="forecast-card">
            <h3>7 Days</h3>
            <div id="aqi_7d">--</div>
        </div>

    </div>

    <!-- AQI Category -->
    <div class="badge" id="category">--</div>

    <!-- Location -->
    <div class="location" id="location">Detecting location...</div>

    <!-- Pollutants -->
    <div class="cards">

        <div class="card">
            <b>PM2.5</b>
            <span id="pm25">--</span>
        </div>

        <div class="card">
            <b>PM10</b>
            <span id="pm10">--</span>
        </div>

        <div class="card">
            <b>NO2</b>
            <span id="no2">--</span>
        </div>

        <div class="card">
            <b>CO</b>
            <span id="co">--</span>
        </div>

        <div class="card">
            <b>SO2</b>
            <span id="so2">--</span>
        </div>

    </div>

    <!-- Advice -->
    <div id="advice">Loading advice...</div>

    <!-- Button -->
    <button onclick="fetchAQI()">Refresh</button>

</div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>

</body>
</html>
